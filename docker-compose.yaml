version: "3.9"

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - host=${host}
      - user=${user}
      - password=${password}
      - db=${db}
      - port=${port}
      - gemini_token=${gemini_token}
    working_dir: /app
    command: python -m app
    ports:
    - "8000:8000"
    mem_limit: 512m
    extra_hosts:
      - "host.docker.internal:172.17.0.1"
    networks:
      - appnet


  tg_bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    environment:
      - TOKEN=${TOKEN}
      - WEB_APP_URL=${WEB_APP_URL}
    working_dir: /app
    command: python main.py
    restart: unless-stopped
    mem_limit: 256m
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

